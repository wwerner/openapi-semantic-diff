openapi: "3.0.3"
info:
  title: Petstore
  version: "1.1.0"
  description: A sample pet store API
servers:
  - url: https://api.example.com/v1
  - url: https://staging.example.com/v1
tags:
  - name: toys
    description: Toy operations
paths:
  /pets:
    get:
      operationId: listPets
      x-custom-info: "This endpoint supports pagination"
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            format: int32
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            format: int32
        - name: sort
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: A list of pets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pet"
          headers:
            X-Rate-Limit:
              description: Rate limit
              schema:
                type: integer
        "429":
          description: Too many requests
        "500":
          description: Server error
    post:
      operationId: createPet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewPet"
      responses:
        "201":
          description: Pet created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
  /pets/{petId}:
    get:
      operationId: getPet
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: A single pet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
    delete:
      operationId: deletePet
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
  /pets/{petId}/toys:
    get:
      operationId: listPetToys
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: A list of toys
components:
  schemas:
    Pet:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          maxLength: 100
        tag:
          type: string
        breed:
          type: string
        status:
          type: string
          enum:
            - available
            - pending
            - sold
            - adopted
          x-extensible-enum:
            - available
            - pending
            - sold
            - adopted
    NewPet:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          maxLength: 100
    Toy:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: X-API-Key
