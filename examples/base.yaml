# Showcase base spec — designed so that diffing against showcase/changed.yaml
# produces every combination of severity × change-type across paths,
# parameters, and schemas.
openapi: "3.0.3"
info:
  title: Showcase API
  version: "1.0.0"

paths:
  # ── Path-level changes ────────────────────────────────────────────────
  /users:
    get:
      operationId: listUsers
      parameters:
        # parameter: will be made required → Modified + Breaking
        - name: limit
          in: query
          required: false
          schema:
            type: integer
        # parameter: will be deprecated → Deprecated + Deprecated
        - name: offset
          in: query
          required: false
          schema:
            type: integer
        # parameter: will be removed → Removed + Breaking
        - name: fields
          in: query
          required: false
          schema:
            type: string
        # (no "sort" parameter yet → will be added → Added + Additive)
      responses:
        "200":
          description: A list of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
          headers:
            X-Rate-Limit:
              description: Rate limit
              schema:
                type: integer
        # response 500: will be removed → Removed + Breaking
        "500":
          description: Server error

    post:
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewUser"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{userId}:
    get:
      operationId: getUser
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: A single user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

    # endpoint: will be deprecated → Deprecated + Deprecated
    delete:
      operationId: deleteUser
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # endpoint: will be removed entirely → Removed + Breaking
  /users/{userId}/avatar:
    put:
      operationId: uploadAvatar
      responses:
        "200":
          description: Avatar uploaded

  # (no /users/{userId}/settings yet → will be added → Added + Additive)

components:
  schemas:
    # ── Schema-level changes ──────────────────────────────────────────
    User:
      type: object
      required:
        - id
        - name
        - email
      properties:
        id:
          type: integer
          format: int64
        # property: will be removed → Removed + Breaking
        name:
          type: string
          maxLength: 100
        email:
          type: string
          # maxLength: will be reduced 200→100 → Modified + Breaking
          maxLength: 200
          # minLength: will be reduced 5→1 → Modified + Additive
          minLength: 5
        # property: will be deprecated → Deprecated + Deprecated
        nickname:
          type: string
        role:
          type: string
          enum:
            - admin
            - editor
            # enum value "viewer": will be removed → Removed + Breaking
            - viewer
        # (no "avatar_url" yet → will be added → Added + Additive)

    NewUser:
      type: object
      required:
        - name
        - email
      properties:
        name:
          type: string
          maxLength: 100
        email:
          type: string

    # schema: will be removed entirely
    # (not produced as Removed + Breaking since schema removal isn't
    #  tracked as a single removal — the individual properties are)
    LegacyProfile:
      type: object
      properties:
        bio:
          type: string

    # (no "Settings" schema yet → will be added → Added + Additive)
